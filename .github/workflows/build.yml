name: Build APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Unzip Project
        run: unzip Omar_Project.zip
      - name: Build APK
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug
      - name: Upload Result
        uses: actions/upload-artifact@v4
        with:
          name: Final_APK
          path: app/build/outputs/apk/debug/*.apk
